<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Life — worxbend</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #11111b;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgba(17, 17, 27, 0.65) 100%
        );
        pointer-events: none;
        z-index: 1;
      }
      #no-webgpu {
        display: none;
        position: fixed;
        inset: 0;
        background: #11111b;
        color: #cdd6f4;
        font-family: "Courier New", monospace;
        font-size: 1.1rem;
        line-height: 1.7;
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 10;
      }
      #no-webgpu span {
        color: #f38ba8;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="no-webgpu">
      <div>
        <span>WebGPU not available</span><br />
        Try Chrome 113+, Edge 113+, or Firefox Nightly<br />
        with <code>dom.webgpu.enabled = true</code>
      </div>
    </div>
    <script type="module" src="/src/life-webgpu.ts"></script>
  </body>
</html>
