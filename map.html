    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #11111b;
        color: #cdd6f4;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 32px;
        line-height: 1.5;
      }

      header {
        max-width: 1200px;
        margin: 0 auto 32px auto;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        color: #cba6f7;
        margin-bottom: 8px;
      }

      p {
        color: #a6adc8;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .card {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: #cdd6f4;
        border: 1px solid #313244;
        border-radius: 8px;
        padding: 14px 18px;
        background: #1e1e2e;
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.1s;
        font-size: 14px;
        font-weight: 500;
      }

      .card:hover {
        background: #313244;
        border-color: #cba6f7;
        color: #cba6f7;
        transform: translateY(-1px);
      }

      .card:active {
        transform: translateY(0);
      }

      .card::before {
        content: "→";
        margin-right: 12px;
        color: #cba6f7;
        opacity: 0.5;
      }

      .card:hover::before {
        opacity: 1;
      }
    </style>
  </head>
